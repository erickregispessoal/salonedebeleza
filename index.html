<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salão de Beleza - Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; background: linear-gradient(135deg, #1e293b 0%, #0f172a 50%, #1a1a2e 100%); }
        .badge { background: rgba(236,72,153,0.15); color: #ec4899; padding: 0.4rem 1rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 1.5rem; border: 1px solid rgba(236,72,153,0.2); }
        h1 { font-size: 3rem; font-weight: 900; margin-bottom: 1rem; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; font-size: 1.1rem; max-width: 500px; margin-bottom: 2rem; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 2rem; max-width: 400px; width: 100%; }
        .card h2 { font-size: 1.25rem; margin-bottom: 1rem; }
        .item { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .item:last-child { border-bottom: none; }
        .price { color: #ec4899; font-weight: 700; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="badge">SALÃO DE BELEZA</div>
        <h1>Beleza & Arte</h1>
        <p>Profissionais qualificados para cuidar da sua beleza. Agendamento fácil pelo WhatsApp.</p>
        <div class="card">
            <h2>Serviços</h2>
            <div class="item"><span>Corte Feminino</span><span class="price">R$ 65,00</span></div>
            <div class="item"><span>Corte Masculino</span><span class="price">R$ 45,00</span></div>
            <div class="item"><span>Coloração</span><span class="price">R$ 120,00</span></div>
            <div class="item"><span>Manicure</span><span class="price">R$ 35,00</span></div>
        </div>
    </div>
</body>
</html>
